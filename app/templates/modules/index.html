{% extends "base.html" %}
{% block title %}Modules · Lesson Master{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Modules</h1>
  <button class="btn btn-primary" onclick="toggleForm('add-module-form')">+ New Module</button>
</div>

<div id="add-module-form" class="card form-card" style="display:none">
  <h2 class="card-title">New Module</h2>
  <form hx-post="/modules/"
        hx-target="#module-list"
        hx-swap="outerHTML"
        hx-on::after-request="toggleForm('add-module-form'); this.reset()">
    <div class="form-row">
      <div class="form-group grow">
        <label>Module Name</label>
        <input type="text" name="name" required placeholder="e.g. Concurrency Deep Dive">
      </div>
    </div>
    <div class="form-group">
      <label>Description <span class="optional">(optional)</span></label>
      <textarea name="description" rows="2" placeholder="What will you learn in this module?"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Module</button>
      <button type="button" class="btn btn-ghost" onclick="toggleForm('add-module-form')">Cancel</button>
    </div>
  </form>
</div>

{% include "partials/module_list.html" %}

<script>
function toggleForm(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
</script>
{% endblock %}
