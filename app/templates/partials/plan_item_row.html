<div class="plan-item-row" id="plan-item-{{ item.id }}">
  <span class="item-position">{{ item.position + 1 }}</span>

  <div class="item-content">
    <a href="/topics/{{ item.topic.slug }}" class="item-topic-name">{{ item.topic.name }}</a>
    <span class="badge badge-{{ item.topic.difficulty }} small">{{ item.topic.difficulty }}</span>
  </div>

  <!-- Status cycle: not_started → in_progress → done → not_started -->
  {% set next_status = {'not_started': 'in_progress', 'in_progress': 'done', 'done': 'not_started'} %}
  <form hx-patch="/plans/items/{{ item.id }}/status"
        hx-target="#plan-item-{{ item.id }}"
        hx-swap="outerHTML">
    <input type="hidden" name="status" value="{{ next_status[item.status] }}">
    <button type="submit" class="status-btn status-btn-{{ item.status }}" title="Click to advance status">
      {% if item.status == 'not_started' %}○{% elif item.status == 'in_progress' %}◑{% else %}●{% endif %}
      {{ item.status | replace('_', ' ') }}
    </button>
  </form>

  <button class="btn btn-danger btn-sm"
          hx-delete="/plans/items/{{ item.id }}"
          hx-target="#plan-item-{{ item.id }}"
          hx-swap="outerHTML"
          hx-confirm="Remove '{{ item.topic.name }}' from this plan?">
    ×
  </button>
</div>
