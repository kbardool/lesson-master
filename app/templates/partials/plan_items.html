<div id="plan-items">
  {% if not plan.items %}
    <div class="empty-state small">
      <p class="empty-sub">No topics in this plan yet. Add one above.</p>
    </div>
  {% else %}
    <div class="plan-item-list">
      {% for item in plan.items %}
        {% include "partials/plan_item_row.html" %}
      {% endfor %}
    </div>
  {% endif %}
</div>
